name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 24

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # `build` runs `assemble` + `check` (which includes `test`). The Java 8
      # toolchain needed to compile is auto-provisioned by the foojay resolver.
      # `shell: bash` makes ./gradlew work uniformly, including on the Windows runner.
      - name: Build and test
        shell: bash
        run: ./gradlew build

      - name: Upload jar
        uses: actions/upload-artifact@v7
        with:
          name: zt-zip-${{ matrix.os }}
          path: build/libs/*.jar
          retention-days: 7

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ matrix.os }}
          path: build/reports/tests/
          retention-days: 7
